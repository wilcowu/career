<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">

    <!-- 引入 Chart.js -->

    <style>
        :root {
            --primary-color: #4a90e2;
            --secondary-color: #f5f7fa;
            --text-color: #333;
            --card-bg: #ffffff;
            --accent-color: #ff6b6b;
            --hover-border: #4a90e2;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            color: var(--text-color);
            padding: 20px 0;
        }

        .container {
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            width: 90%;
            max-width: 800px;
            padding: 40px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        h1 {
            color: var(--primary-color);
            margin-bottom: 10px;
            font-size: 2em;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 1em;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background-color: #e0e0e0;
            border-radius: 4px;
            margin-bottom: 30px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background-color: var(--primary-color);
            width: 0%;
            transition: width 0.3s ease;
        }

        .question-card {
            display: none;
            animation: fadeIn 0.5s;
        }

        .question-card.active {
            display: block;
        }

        .question-text {
            font-size: 1.3em;
            margin-bottom: 25px;
            font-weight: 600;
            color: #2c3e50;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 4个选项的布局 */
        .options-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }

        @media (min-width: 600px) {
            .options-grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        .option-btn {
            background: var(--secondary-color);
            border: 2px solid transparent;
            padding: 20px 15px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1em;
            color: var(--text-color);
            text-align: left;
            line-height: 1.4;
            position: relative;
        }

        .option-btn:hover {
            background: #eef2f7;
            transform: translateY(-2px);
            border-color: var(--hover-border);
            box-shadow: 0 4px 12px rgba(74, 144, 226, 0.15);
        }

        .option-btn.selected {
            background: #ebf5ff;
            border-color: var(--primary-color);
            color: var(--primary-color);
            font-weight: 600;
        }

        .nav-buttons {
            margin-top: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            transition: background 0.3s;
        }

        .btn-prev {
            background: #e0e0e0;
            color: #666;
        }
        
        .btn-prev:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-next {
            background: var(--primary-color);
            color: white;
        }

        .btn-next:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        /* 结果页样式 */
        .result-section {
            display: none;
            animation: slideUp 0.6s;
        }

        .radar-container {
            position: relative;
            height: 350px;
            width: 100%;
            margin: 20px auto;
            max-width: 500px;
        }

        .code-display {
            font-size: 2.5em;
            font-weight: bold;
            color: var(--primary-color);
            letter-spacing: 8px;
            margin: 15px 0;
            font-family: 'Courier New', monospace;
            background: #f0f4f8;
            padding: 10px;
            border-radius: 8px;
            display: inline-block;
        }

        .recommendation-box {
            background: #f8f9fa;
            border-left: 5px solid var(--accent-color);
            padding: 25px;
            margin-top: 25px;
            text-align: left;
            border-radius: 0 8px 8px 0;
        }

        .job-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 15px;
        }

        .job-tag {
            background: white;
            border: 1px solid var(--primary-color);
            color: var(--primary-color);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.9em;
            font-weight: 500;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from { transform: translateY(30px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>

                { t: "I", text: "算法是否精准，功能是否强大" },
                { t: "C", text: "隐私条款是否清晰，数据是否安全" },
                { t: "E", text: "是否有会员增值服务，商业模式如何" }
            ]
        },
        {
            q: "如果学校要建一个花园，你负责？",
            opts: [
                { t: "R", text: "种植花草，铺设水管和电路" },
                { t: "A", text: "设计景观布局和色彩搭配" },
                { t: "S", text: "组织同学一起劳动，讲解植物知识" },
                { t: "C", text: "采购清单管理和预算控制" }
            ]
        },
        {
            q: "在阅读新闻时，你最先看？",
            opts: [
                { t: "E", text: "财经版块，关注股市和公司并购" },
                { t: "I", text: "科技版块，关注最新发明发现" },
                { t: "S", text: "社会版块，关注民生和人物故事" },
                { t: "R", text: "汽车或房产版块，关注实物参数" }
            ]
        },
        {
            q: "你讨厌的工作环境是？",
            opts: [
                { t: "A", text: "死板、不允许任何个性发挥的地方" },
                { t: "R", text: "整天坐着不动，没有实际操作机会" },
                { t: "I", text: "只凭经验办事，不讲科学依据" },
                { t: "C", text: "混乱无序，经常变动计划" }
            ]
        },
        {
            q: "假如你要送礼物，你会选？",
            opts: [
                { t: "A", text: "自己亲手做的工艺品" },
                { t: "S", text: "对方急需的生活用品或书籍" },
                { t: "E", text: "有品牌价值、拿得出手的礼品" },
                { t: "I", text: "高科技小玩意或解谜玩具" }
            ]
        },
        {
            q: "对于“大数据”，你感兴趣的是？",
            opts: [
                { t: "I", text: "挖掘数据背后的关联规则" },
                { t: "C", text: "清洗数据，建立规范的数据库" },
                { t: "E", text: "利用数据制定营销策略" },
                { t: "A", text: "用数据生成可视化的艺术图形" }
            ]
        },
        {
            q: "毕业聚餐时，你通常是？",
            opts: [
                { t: "E", text: "组织者，安排地点和流程" },
                { t: "S", text: "照顾者，确保每个人都开心" },
                { t: "C", text: "记账员，负责 AA 制收款" },
                { t: "A", text: "气氛组，表演节目或拍照记录" }
            ]
        }
    ];

    let currentIdx = 0;
    // 记录用户选择的类型序列
    let userChoices = new Array(questions.length).fill(null);

    function init() {
        renderQuestion();
        updateProgress();
    }

    function renderQuestion() {
        const container = document.getElementById('question-container');
        const qData = questions[currentIdx];
        
        let html = `
            <div class="question-card active">
                <div class="question-text">${currentIdx + 1}. ${qData.q}</div>
                <div class="options-grid">
        `;

        qData.opts.forEach((opt, index) => {
            const isSelected = userChoices[currentIdx] === opt.t ? 'selected' : '';
            html += `
                <button class="option-btn ${isSelected}" onclick="selectOption('${opt.t}', this)">
                    ${opt.text}
                </button>
            `;
        });

        html += `</div></div>`;
        container.innerHTML = html;

        // 更新按钮状态
        document.getElementById('question-count').innerText = `第 ${currentIdx + 1} / ${questions.length} 题`;
        document.getElementById('prev-btn').disabled = currentIdx === 0;
        
        const nextBtn = document.getElementById('next-btn');
        if (currentIdx === questions.length - 1) {
            nextBtn.innerText = "查看结果 🚀";
        } else {
            nextBtn.innerText = "下一题 →";
        }
        
        // 如果当前题已选，启用下一题按钮
        nextBtn.disabled = userChoices[currentIdx] === null;
    }

    function selectOption(type, btnElement) {
        // 记录选择
        userChoices[currentIdx] = type;
        
        // 视觉更新
        const buttons = document.querySelectorAll('.option-btn');
        buttons.forEach(b => b.classList.remove('selected'));
        btnElement.classList.add('selected');

        // 启用下一题按钮
        document.getElementById('next-btn').disabled = false;
    }

    function nextQuestion() {
        if (userChoices[currentIdx] === null) return; // 防止未选跳转

        if (currentIdx < questions.length - 1) {
            currentIdx++;
            renderQuestion();
            updateProgress();
        } else {
            showResults();
        }
    }

    function prevQuestion() {
        if (currentIdx > 0) {
            currentIdx--;
            renderQuestion();
            updateProgress();
        }
    }

    function updateProgress() {
        const percent = ((currentIdx + 1) / questions.length) * 100;
        document.getElementById('progress').style.width = `${percent}%`;
    }

    function showResults() {
        document.getElementById('quiz-area').style.display = 'none';
        document.getElementById('result-area').style.display = 'block';

        // 计算得分
        const scores = { R: 0, I: 0, A: 0, S: 0, E: 0, C: 0 };
        userChoices.forEach(type => {
            if (type) scores[type]++;
        });

        // 排序获取前三码
        const sortedKeys = Object.keys(scores).sort((a, b) => scores[b] - scores[a]);
        const top3Code = sortedKeys.slice(0, 3).join('');
        
        document.getElementById('result-code').innerText = top3Code;

        // 填充分析
        const mainType = sortedKeys[0];
        const subType = sortedKeys[1];
        const mainData = hollandData[mainType];
        const subData = hollandData[subType];

        document.getElementById('result-desc').innerHTML = `
            你的主导类型是 <strong>${mainData.name}</strong>，辅助类型是 <strong>${subData.name}</strong>。<br><br>
            ${mainData.desc}<br>
            同时，你也具备 ${subData.desc.toLowerCase()}
        `;

        // 推荐职业 (混合前两种类型的细分职业)
        const jobContainer = document.getElementById('job-list');
        jobContainer.innerHTML = '';
        const recommendedJobs = [
            ...mainData.jobs.slice(0, 4),
            ...subData.jobs.slice(0, 3)
        ];
        // 去重
        const uniqueJobs = [...new Set(recommendedJobs)];
        
        uniqueJobs.forEach(job => {
            const tag = document.createElement('span');
            tag.className = 'job-tag';
            tag.innerText = job;
            jobContainer.appendChild(tag);
        });

        // 行动建议
        const actionList = document.getElementById('action-plan');
        actionList.innerHTML = '';
        const actions = [
            ...mainData.actions.slice(0, 2),
            ...subData.actions.slice(0, 2)
        ];
        const uniqueActions = [...new Set(actions)];
        uniqueActions.forEach(act => {
            const li = document.createElement('li');
            li.innerText = act;
            actionList.appendChild(li);
        });

        // 绘制雷达图
        drawRadarChart(scores);
    }

    function drawRadarChart(scores) {
        const ctx = document.getElementById('radarChart').getContext('2d');
        
        // 计算最大值以设置刻度（每类题目数量可能不同，这里每类大约5题）
        // 简单起见，设置最大值为题目总数/6 的上取整，或者固定为 10
        const maxVal = 10; 

        new Chart(ctx, {
            type: 'radar',
            data: {
                labels: ['现实型 (R)', '研究型 (I)', '艺术型 (A)', '社会型 (S)', '企业型 (E)', '常规型 (C)'],
                datasets: [{
                    label: '你的得分分布',
                    data: [scores.R, scores.I, scores.A, scores.S, scores.E, scores.C],
                    backgroundColor: 'rgba(74, 144, 226, 0.3)',
                    borderColor: '#4a90e2',
                    borderWidth: 2,
                    pointBackgroundColor: '#fff',
                    pointBorderColor: '#4a90e2',
                    pointRadius: 5
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                scales: {
                    r: {
                        suggestedMin: 0,
                        suggestedMax: maxVal,
                        ticks: {
                            stepSize: 2,
                            backdropColor: 'transparent',
                            color: '#666'
                        },
                        grid: {
                            color: '#e0e0e0'
                        },
                        angleLines: {
                            color: '#e0e0e0'
                        },
                        pointLabels: {
                            font: { size: 12, weight: 'bold' },
                            color: '#333'
                        }
                    }
                },
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        callbacks: {
                            label: (ctx) => `${ctx.label}: ${ctx.raw} 分`
                        }
                    }
                }
            }
        });
    }

    // 启动
    init();
</script>

</body>
</html>
